<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JRK DEEEV - Official Gaming Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 50%, #000000 100%);
            background-size: 400% 400%;
            animation: gradientShift 10s ease infinite;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glassmorphism {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        .glow:hover {
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.8); }
            50% { box-shadow: 0 0 30px rgba(255, 215, 0, 1); }
        }
        .floating-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }
        .particle {
            position: absolute;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }
        .particle:nth-child(1) { width: 4px; height: 4px; left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { width: 6px; height: 6px; left: 20%; animation-delay: 1s; }
        .particle:nth-child(3) { width: 3px; height: 3px; left: 30%; animation-delay: 2s; }
        .particle:nth-child(4) { width: 5px; height: 5px; left: 40%; animation-delay: 3s; }
        .particle:nth-child(5) { width: 4px; height: 4px; left: 50%; animation-delay: 4s; }
        .particle:nth-child(6) { width: 6px; height: 6px; left: 60%; animation-delay: 5s; }
        .particle:nth-child(7) { width: 3px; height: 3px; left: 70%; animation-delay: 6s; }
        .particle:nth-child(8) { width: 5px; height: 5px; left: 80%; animation-delay: 7s; }
        .particle:nth-child(9) { width: 4px; height: 4px; left: 90%; animation-delay: 8s; }
        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            50% { transform: translateY(50vh) rotate(180deg); opacity: 1; }
        }
    </style>
</head>
<body class="text-white min-h-screen relative overflow-hidden">
    <div class="floating-particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Navbar -->
    <nav class="bg-black/50 backdrop-blur-md border-b border-yellow-500/20 py-4 px-6 fixed top-0 w-full z-10">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-yellow-500">JRK DEEEV</h1>
            <div class="text-sm text-gray-400">Official Gaming Platform</div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex items-center justify-center min-h-screen pt-20 pb-20">
        <div class="text-center">
            <div class="mb-8">
                <div class="inline-flex items-center bg-green-500/20 text-green-400 px-4 py-2 rounded-full text-sm font-medium border border-green-500/30">
                    <div class="w-2 h-2 bg-green-400 rounded-full mr-2 animate-pulse"></div>
                    Status: Online
                </div>
            </div>

            <div class="glassmorphism p-8 rounded-2xl shadow-2xl w-96 text-center transform hover:scale-105 transition duration-500">
                <div class="mb-6">
                    <div class="bg-yellow-500 w-20 h-20 rounded-full flex items-center justify-center mx-auto shadow-lg shadow-yellow-500/50">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-black" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                        </svg>
                    </div>
                </div>

                <h2 class="text-3xl font-bold mb-4 text-yellow-500">Download Config</h2>
                <p class="text-gray-300 text-base mb-6">Get the latest configuration file for enhanced gaming experience.</p>

                <a href="localconfig.json" download="localconfig.json" 
                   class="inline-block w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-4 rounded-lg transition duration-300 shadow-lg glow">
                    Download Now
                </a>

                <div class="mt-6 text-xs text-gray-500 uppercase tracking-widest">
                    v1.0.2 - Security Bypass Enabled
                </div>
                <div class="mt-2 text-xs text-gray-400">
                    Last Updated: April 18, 2026
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-black/50 backdrop-blur-md border-t border-yellow-500/20 py-4 px-6 fixed bottom-0 w-full z-10">
        <div class="max-w-7xl mx-auto text-center text-sm text-gray-400">
            Developed by JRK DEEEV
        </div>
    </footer>

</body>
</html>
