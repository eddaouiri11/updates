<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل تطبيق Eddaouiri</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --ios-blue: #007aff; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: #f2f2f7;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; text-align: center;
        }
        .card {
            background: white; width: 85%; max-width: 350px;
            padding: 40px 20px; border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .icon {
            width: 80px; height: 80px; background: var(--ios-blue);
            border-radius: 18px; margin: 0 auto 20px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 8px 15px rgba(0,122,255,0.3);
        }
        .btn-download {
            background: var(--ios-blue); color: white; border: none;
            padding: 15px 30px; border-radius: 15px;
            font-size: 16px; font-weight: 700; width: 100%;
            cursor: pointer; transition: 0.2s;
        }
        .btn-download:active { transform: scale(0.98); }
        .loader { display: none; margin-top: 15px; font-size: 14px; color: #8e8e93; }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">
        <svg width="40" height="40" fill="white" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
    </div>
    <h1 style="font-size: 20px; margin-bottom: 10px;">Eddaouiri Pro Max</h1>
    <p style="color: #666; font-size: 14px; margin-bottom: 25px;">اضغط للتحميل والتثبيت مباشرة</p>
    
    <button id="installBtn" class="btn-download">تحميل التطبيق (App)</button>
    <div id="loader" class="loader">جاري التحضير...</div>

    <p id="ios-msg" style="display:none; font-size: 12px; margin-top: 15px; color: #ff3b30;">
        لمستخدمي iPhone: اضغط على زر المشاركة ثم "Add to Home Screen"
    </p>
</div>

<script>
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');
    const loader = document.getElementById('loader');

    // تسجيل الـ Service Worker ضروري باش يخدم التثبيت
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    // الانتظار حتى المتصفح يعطي الإذن بالتثبيت
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
    });

    installBtn.addEventListener('click', async () => {
        // إظهار اللودر كأن التطبيق كيتحمل
        installBtn.style.display = 'none';
        loader.style.display = 'block';

        // محاكاة تحميل بسيط
        setTimeout(async () => {
            if (deferredPrompt) {
                loader.innerText = 'جاري التثبيت...';
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('User installed the app');
                }
                deferredPrompt = null;
            } else {
                // إذا كان ديجا مثبت أو المتصفح لا يدعم
                alert('التطبيق جاهز! إذا لم يبدأ التثبيت، تأكد أنك تستعمل متصفح Chrome.');
            }
            loader.style.display = 'none';
            installBtn.style.display = 'block';
        }, 1500);
    });

    // كشف الأيفون
    if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
        document.getElementById('ios-msg').style.display = 'block';
    }
</script>

</body>
</html>
