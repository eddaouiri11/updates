<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eddaouiri Invoice App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text-main: #1e293b;
            --danger: #ef4444;
            --success: #10b981;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container { width: 100%; max-width: 500px; padding-bottom: 100px; }

        /* تصميم الفاتورة النظيف (مثل النسخة السابقة) */
        .invoice-card {
            background: var(--card);
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        header h1 { margin: 0; font-size: 24px; color: var(--primary); }
        .info-bar { display: flex; justify-content: space-between; margin-top: 10px; font-size: 13px; color: #64748b; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f1f5f9; padding: 12px 8px; font-size: 14px; text-align: right; }
        td { padding: 12px 5px; border-bottom: 1px solid #e2e8f0; vertical-align: middle; }

        input {
            width: 100%;
            border: 1px solid transparent;
            padding: 8px;
            font-size: 14px;
            outline: none;
            background: transparent;
        }
        input:focus { background: #f0f7ff; border-bottom: 1px solid var(--accent); }

        /* زر القياس الذي يفتح النافذة */
        .size-trigger {
            width: 100%;
            padding: 8px;
            border: 1px dashed #cbd5e1;
            border-radius: 6px;
            text-align: center;
            font-size: 13px;
            cursor: pointer;
            color: var(--accent);
            background: #f8fafc;
        }

        .total-card {
            margin-top: 25px;
            background: var(--primary);
            color: white;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* نافذة الإدخال (Modal) */
        #size-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 80%;
            max-width: 300px;
            text-align: center;
        }
        .modal-inputs { display: flex; align-items: center; gap: 10px; margin: 20px 0; }
        .modal-inputs input { border: 1px solid #ddd; border-radius: 8px; text-align: center; padding: 12px; background: white; }

        /* الأزرار */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: white;
            padding: 15px;
            display: flex;
            gap: 10px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            z-index: 100;
        }
        .btn { flex: 1; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-add { background: var(--success); color: white; }
        .btn-generate { background: var(--accent); color: white; }
        .btn-ok { background: var(--primary); color: white; width: 100%; margin-top: 10px; }
        
        .btn-remove { background: var(--danger); color: white; border: none; border-radius: 5px; padding: 5px 10px; cursor: pointer; }

    </style>
</head>
<body>

    <div class="app-container">
        <div id="capture-area" class="invoice-card">
            <header>
                <h1 contenteditable="true">Eddaouiri Abdelkarim</h1>
                <p contenteditable="true">متخصص الألومنيوم والزجاج</p>
                <div class="info-bar">
                    <span>التاريخ: <span id="current-date"></span></span>
                    <span>الوقت: <span id="current-time"></span></span>
                </div>
            </header>

            <table>
                <thead>
                    <tr>
                        <th width="45%">الوصف</th>
                        <th width="30%">القياس</th>
                        <th width="20%">الثمن</th>
                        <th class="no-export" width="5%"></th>
                    </tr>
                </thead>
                <tbody id="invoice-body">
                    <tr>
                        <td><input type="text" value="باب ألومنيوم"></td>
                        <td><div class="size-trigger" onclick="openSizeModal(this)">80 × 222</div></td>
                        <td><input type="number" class="price-input" value="1400" oninput="calculateTotal()"></td>
                        <td class="no-export"><button class="btn-remove" onclick="removeRow(this)">✕</button></td>
                    </tr>
                </tbody>
            </table>

            <div class="total-card">
                <span>المجموع الإجمالي:</span>
                <span id="grand-total" style="font-size: 24px; font-weight: 800;">1,400 DH</span>
            </div>

            <footer style="margin-top: 30px; text-align: center; font-size: 12px; color: #64748b;">
                <p contenteditable="true">شكراً لثقتكم بنا | الهاتف: 0600000000</p>
            </footer>
        </div>
    </div>

    <div id="size-modal">
        <div class="modal-content">
            <h3>أدخل القياسات</h3>
            <div class="modal-inputs">
                <input type="number" id="modal-w" placeholder="العرض">
                <span>×</span>
                <input type="number" id="modal-h" placeholder="الطول">
            </div>
            <button class="btn btn-ok" onclick="saveSize()">تم</button>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="btn btn-add" onclick="addRow()">➕ إضافة عنصر</button>
        <button class="btn btn-generate" onclick="generatePhoto()">📸 حفظ الفاتورة</button>
    </div>

    <script>
        let currentSizeElement = null;

        // تحديث التاريخ والوقت
        function updateDateTime() {
            const now = new Date();
            document.getElementById('current-date').innerText = now.toLocaleDateString('ar-MA');
            document.getElementById('current-time').innerText = now.toLocaleTimeString('ar-MA', {hour:'2-digit', minute:'2-digit'});
        }
        updateDateTime();

        // إدارة السطور
        function addRow() {
            const tbody = document.getElementById('invoice-body');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><input type="text" placeholder="اسم المنتج..."></td>
                <td><div class="size-trigger" onclick="openSizeModal(this)">اضغط للقياس</div></td>
                <td><input type="number" class="price-input" value="0" oninput="calculateTotal()"></td>
                <td class="no-export"><button class="btn-remove" onclick="removeRow(this)">✕</button></td>
            `;
            tbody.appendChild(row);
        }

        function removeRow(btn) {
            btn.parentElement.parentElement.remove();
            calculateTotal();
        }

        function calculateTotal() {
            let total = 0;
            document.querySelectorAll('.price-input').forEach(i => total += (parseFloat(i.value) || 0));
            document.getElementById('grand-total').innerText = total.toLocaleString() + ' DH';
        }

        // إدارة نافذة القياس
        function openSizeModal(el) {
            currentSizeElement = el;
            document.getElementById('size-modal').style.display = 'flex';
            document.getElementById('modal-w').focus();
        }

        function saveSize() {
            const w = document.getElementById('modal-w').value || '0';
            const h = document.getElementById('modal-h').value || '0';
            currentSizeElement.innerText = `${w} × ${h}`;
            document.getElementById('size-modal').style.display = 'none';
            document.getElementById('modal-w').value = '';
            document.getElementById('modal-h').value = '';
        }

        // إنتاج الصورة (بجودة عالية وتصميم نظيف)
        function generatePhoto() {
            const captureArea = document.getElementById('capture-area');
            const noExport = document.querySelectorAll('.no-export');
            
            // إخفاء العناصر غير الضرورية
            noExport.forEach(el => el.style.display = 'none');
            
            html2canvas(captureArea, {
                scale: 3, // جودة عالية جداً
                backgroundColor: "#ffffff",
                useCORS: true
            }).then(canvas => {
                noExport.forEach(el => el.style.display = 'table-cell');
                
                const link = document.createElement('a');
                link.download = `فاتورة_الدويري_${Date.now()}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>
