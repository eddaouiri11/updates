<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eddaouiri Pro - فاتورة عمل</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #2563eb;
            --bg: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --ios-red: #ff3b30;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
            padding-bottom: 120px; /* مساحة للأزرار تحت */
        }

        .invoice-box {
            max-width: 650px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .logo-area h1 {
            margin: 0;
            font-size: 22px;
            text-transform: uppercase;
            color: var(--primary);
            letter-spacing: -0.5px;
            outline: none;
        }

        .logo-area p {
            margin: 4px 0 0;
            font-size: 13px;
            color: var(--text-muted);
            outline: none;
        }

        .status-badge {
            background: #dcfce7;
            color: #166534;
            padding: 6px 12px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 600;
        }

        .date-info {
            margin-bottom: 25px;
            font-size: 14px;
            color: var(--text-main);
            display: flex;
            gap: 10px;
        }

        /* Items List Style */
        .items-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #f1f5f9;
            position: relative;
        }

        .item-info {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .item-name-input {
            border: none;
            font-weight: 600;
            font-size: 15px;
            color: var(--text-main);
            outline: none;
            background: transparent;
            width: 100%;
            margin-bottom: 4px;
        }

        .item-size-btn {
            font-size: 12px;
            color: var(--accent);
            cursor: pointer;
            font-weight: 500;
            display: inline-block;
            background: #eff6ff;
            padding: 2px 8px;
            border-radius: 4px;
            width: fit-content;
        }

        .price-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .item-price-input {
            font-weight: 700;
            color: var(--primary);
            font-size: 16px;
            border: none;
            outline: none;
            background: transparent;
            width: 80px;
            text-align: left;
        }

        .currency {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* Summary Card */
        .total-card {
            margin-top: 35px;
            background: var(--primary);
            color: white;
            padding: 24px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.2);
        }

        .total-label {
            font-size: 15px;
            opacity: 0.9;
        }

        .total-val {
            font-size: 24px;
            font-weight: 800;
        }

        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            border-top: 1px solid #f1f5f9;
            padding-top: 20px;
        }

        /* Action Buttons Fixed Bar */
        .actions-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: white;
            padding: 12px 25px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            z-index: 1000;
            width: 90%;
            max-width: 400px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }

        .btn-add { background: #f1f5f9; color: var(--primary); }
        .btn-save { background: var(--accent); color: white; }
        .btn-delete { color: var(--ios-red); background: none; border: none; font-size: 18px; cursor: pointer; padding: 0 10px; }

        /* Modal Style */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .modal {
            background: white;
            padding: 25px;
            border-radius: 18px;
            width: 300px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .modal input {
            width: 80px;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            text-align: center;
            font-size: 16px;
            outline-color: var(--accent);
        }

        .btn-confirm {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 10px;
            margin-top: 15px;
            font-weight: 700;
        }

        /* Capture Overrides */
        .is-capturing .actions-bar,
        .is-capturing .btn-delete { display: none !important; }
        .is-capturing { padding: 0; }
        .is-capturing .invoice-box { box-shadow: none; border: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="invoice-box" id="invoice-capture">
        <header>
            <div class="logo-area">
                <h1 contenteditable="true" spellcheck="false">Eddaouiri Abdelkarim</h1>
                <p contenteditable="true" spellcheck="false">متخصص الألومنيوم والزجاج</p>
            </div>
            <div class="status-badge" contenteditable="true">طلب مكتمل</div>
        </header>

        <div class="date-info">
            <strong>التاريخ:</strong> <span id="current-date"></span>
        </div>

        <ul class="items-list" id="items-container">
            <li class="item-row">
                <div class="item-info">
                    <input type="text" class="item-name-input" value="باب ألومنيوم" spellcheck="false">
                    <span class="item-size-btn" onclick="openSizePicker(this)">80 × 222.5 سم</span>
                </div>
                <div class="price-container">
                    <input type="number" class="item-price-input" value="1400" oninput="calculateTotal()">
                    <span class="currency">DH</span>
                    <button class="btn-delete" onclick="this.closest('li').remove(); calculateTotal();">✕</button>
                </div>
            </li>
        </ul>

        <div class="total-card">
            <span class="total-label">المجموع الإجمالي (Total):</span>
            <span class="total-val" id="total-display">1400 DH</span>
        </div>

        <footer>
            <p contenteditable="true" spellcheck="false">نشكركم على اختياركم لخدماتنا | الهاتف: 06 00 00 00 00</p>
        </footer>
    </div>

    <!-- Actions Bar -->
    <div class="actions-bar">
        <button class="btn btn-add" onclick="addItem()">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg>
            إضافة
        </button>
        <button class="btn btn-save" onclick="exportImage()">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
            حفظ الصورة
        </button>
    </div>

    <!-- Modal -->
    <div id="modal-overlay">
        <div class="modal">
            <h3 style="margin-top:0">تعديل القياس</h3>
            <div style="display:flex; align-items:center; justify-content:center; gap:10px;">
                <input type="number" id="w-input" placeholder="عرض">
                <span>×</span>
                <input type="number" id="h-input" placeholder="طول">
            </div>
            <button class="btn-confirm" onclick="applySize()">تحديث</button>
            <button style="background:none; border:none; margin-top:10px; color:var(--text-muted); cursor:pointer" onclick="closeModal()">إلغاء</button>
        </div>
    </div>

    <script>
        let targetSizeSpan = null;

        // Set current date
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('ar-MA');

        function addItem() {
            const container = document.getElementById('items-container');
            const li = document.createElement('li');
            li.className = 'item-row';
            li.innerHTML = `
                <div class="item-info">
                    <input type="text" class="item-name-input" placeholder="اسم المنتج..." spellcheck="false">
                    <span class="item-size-btn" onclick="openSizePicker(this)">0 × 0 سم</span>
                </div>
                <div class="price-container">
                    <input type="number" class="item-price-input" value="0" oninput="calculateTotal()">
                    <span class="currency">DH</span>
                    <button class="btn-delete" onclick="this.closest('li').remove(); calculateTotal();">✕</button>
                </div>
            `;
            container.appendChild(li);
            calculateTotal();
        }

        function calculateTotal() {
            let total = 0;
            document.querySelectorAll('.item-price-input').forEach(input => {
                total += parseFloat(input.value || 0);
            });
            // Format without trailing zeros .00
            document.getElementById('total-display').innerText = total.toLocaleString('en-US') + ' DH';
        }

        function openSizePicker(el) {
            targetSizeSpan = el;
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('w-input').focus();
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        function applySize() {
            const w = document.getElementById('w-input').value || '0';
            const h = document.getElementById('h-input').value || '0';
            targetSizeSpan.innerText = `${w} × ${h} سم`;
            closeModal();
            document.getElementById('w-input').value = '';
            document.getElementById('h-input').value = '';
        }

        async function exportImage() {
            const target = document.getElementById('invoice-capture');
            document.body.classList.add('is-capturing');

            // Replace inputs with spans for the screenshot
            const inputs = target.querySelectorAll('input');
            const temps = [];
            inputs.forEach(inp => {
                const span = document.createElement('span');
                span.innerText = inp.value;
                span.style.cssText = window.getComputedStyle(inp).cssText;
                span.style.display = 'inline-block';
                inp.style.display = 'none';
                inp.parentNode.insertBefore(span, inp);
                temps.push({s: span, i: inp});
            });

            try {
                const canvas = await html2canvas(target, {
                    scale: 3,
                    backgroundColor: "#f8fafc"
                });
                const link = document.createElement('a');
                link.download = `فاتورة_الدويري_${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
            } finally {
                temps.forEach(t => {
                    t.s.remove();
                    t.i.style.display = 'inline-block';
                });
                document.body.classList.remove('is-capturing');
            }
        }

        // Initialize total
        calculateTotal();
    </script>
</body>
</html>
