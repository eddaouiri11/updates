<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eddaouiri Pro Max</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --ios-blue: #007aff;
            --ios-bg: #f2f2f7;
            --ios-card: #ffffff;
            --ios-text: #1c1c1e;
            --ios-secondary: #8e8e93;
            --ios-red: #ff3b30;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body {
            background-color: var(--ios-bg);
            margin: 0; padding: 0; color: var(--ios-text);
            display: flex; flex-direction: column; align-items: center;
        }

        .app-shell {
            width: 100%; max-width: 500px;
            padding: 15px; padding-bottom: 110px;
        }

        /* Invoice Style */
        .invoice-card {
            background: var(--ios-card);
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 30px 20px;
            position: relative;
        }

        header { text-align: right; border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }
        header h1 { margin: 0; font-size: 24px; font-weight: 800; color: #000; }
        header p { margin: 5px 0; font-size: 14px; color: var(--ios-secondary); font-weight: 500; }

        .meta-data {
            display: flex; justify-content: space-between;
            background: #f8f8f8; padding: 12px; border-radius: 12px;
            font-size: 13px; margin-bottom: 20px; font-weight: 600;
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: right; font-size: 11px; color: var(--ios-secondary); padding: 10px 5px; text-transform: uppercase; }
        td { padding: 15px 5px; border-bottom: 0.5px solid #f0f0f0; }

        .input-plain { border: none; outline: none; background: transparent; width: 100%; font-size: 15px; font-weight: 600; }
        
        .size-tag {
            background: #f2f2f7; color: var(--ios-blue);
            padding: 6px 10px; border-radius: 8px; font-size: 12px;
            font-weight: 700; cursor: pointer; display: inline-block;
        }

        .price-input { width: 80px; text-align: left; font-weight: 800; color: var(--ios-blue); font-size: 16px; }

        .total-box {
            margin-top: 25px; padding: 20px;
            background: #f9f9fb; border-radius: 18px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .total-label { font-weight: 700; color: var(--ios-secondary); }
        .total-amount { font-size: 22px; font-weight: 900; color: #000; }

        footer { margin-top: 30px; text-align: center; font-size: 12px; color: var(--ios-secondary); line-height: 1.5; }

        /* Floating Actions Bar */
        .actions-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px;
            background: rgba(255,255,255,0.8); backdrop-filter: blur(20px);
            padding: 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.3);
            display: flex; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .btn {
            flex: 1; border: none; border-radius: 14px; padding: 14px;
            font-weight: 700; font-size: 15px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: 0.2s;
        }
        .btn-black { background: #000; color: #fff; }
        .btn-blue { background: var(--ios-blue); color: #fff; }
        .btn:active { transform: scale(0.95); opacity: 0.8; }

        .btn-del {
            background: #ff3b3015; color: var(--ios-red); border: none;
            width: 28px; height: 28px; border-radius: 50%; font-weight: 800;
        }

        /* Modal Style */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(5px);
            z-index: 999; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #fff; width: 280px; padding: 25px; border-radius: 20px; text-align: center;
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-inputs { display: flex; align-items: center; gap: 10px; margin: 20px 0; }
        .modal-inputs input { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; text-align: center; font-size: 18px; font-weight: 700; outline: none; }
        .btn-done { background: var(--ios-blue); color: #fff; border: none; width: 100%; padding: 12px; border-radius: 12px; font-weight: 700; }

        /* Styles for Capture */
        .is-capturing .actions-bar, .is-capturing .btn-del { display: none !important; }
        .is-capturing .invoice-card { box-shadow: none; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="app-shell">
    <div id="invoice-capture" class="invoice-card">
        <header>
            <h1 contenteditable="true">Abdelkarim Eddaouiri</h1>
            <p contenteditable="true">Menuiserie Aluminium & Vitrage</p>
            <p contenteditable="true">📍 Al Hoceïma, Maroc</p>
        </header>

        <div class="meta-data">
            <div>التاريخ: <span id="date-now"></span></div>
            <div id="time-now" style="color: var(--ios-blue);"></div>
        </div>

        <table>
            <thead>
                <tr>
                    <th width="50%">الوصف</th>
                    <th width="20%">القياس</th>
                    <th width="25%">الثمن</th>
                    <th width="5%"></th>
                </tr>
            </thead>
            <tbody id="list">
                <tr>
                    <td><input type="text" class="input-plain" value="نافذة ألومنيوم"></td>
                    <td><div class="size-tag" onclick="openModal(this)">120×100</div></td>
                    <td><input type="number" class="input-plain price-input" value="850" oninput="calc()"></td>
                    <td><button class="btn-del" onclick="delRow(this)">✕</button></td>
                </tr>
            </tbody>
        </table>

        <div class="total-box">
            <span class="total-label">المجموع الصافي</span>
            <span class="total-amount" id="total-val">850.00 DH</span>
        </div>

        <footer>
            <p contenteditable="true">شكراً لثقتكم بنا<br>الهاتف: 06 00 00 00 00</p>
        </footer>
    </div>
</div>

<div id="modal">
    <div class="modal-content">
        <h3 style="margin:0;">تحديد القياس</h3>
        <div class="modal-inputs">
            <input type="number" id="w" placeholder="W">
            <span>×</span>
            <input type="number" id="h" placeholder="H">
        </div>
        <button class="btn-done" onclick="saveSize()">تم</button>
    </div>
</div>

<div class="actions-bar">
    <button class="btn btn-black" onclick="addRow()">
        <svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        إضافة
    </button>
    <button class="btn btn-blue" onclick="exportImg()">
        <svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M12 16l-4-4h3V4h2v8h3l-4 4zm9 4H3v-2h18v2z"/></svg>
        حفظ الصورة
    </button>
</div>

<script>
    let activeTag = null;

    // تحديث التاريخ
    function updateDT() {
        const n = new Date();
        document.getElementById('date-now').innerText = n.toLocaleDateString('ar-MA');
        document.getElementById('time-now').innerText = n.toLocaleTimeString('ar-MA', {hour:'2-digit', minute:'2-digit'});
    }
    updateDT();

    function addRow() {
        const row = `<tr>
            <td><input type="text" class="input-plain" placeholder="وصف المنتج..."></td>
            <td><div class="size-tag" onclick="openModal(this)">0×0</div></td>
            <td><input type="number" class="input-plain price-input" value="0" oninput="calc()"></td>
            <td><button class="btn-del" onclick="delRow(this)">✕</button></td>
        </tr>`;
        document.getElementById('list').insertAdjacentHTML('beforeend', row);
    }

    function delRow(btn) {
        btn.closest('tr').remove();
        calc();
    }

    function calc() {
        let t = 0;
        document.querySelectorAll('.price-input').forEach(i => {
            t += parseFloat(i.value || 0);
        });
        document.getElementById('total-val').innerText = t.toLocaleString('en-US', {minimumFractionDigits: 2}) + ' DH';
    }

    function openModal(el) {
        activeTag = el;
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('w').focus();
    }

    function saveSize() {
        const wv = document.getElementById('w').value || '0';
        const hv = document.getElementById('h').value || '0';
        activeTag.innerText = wv + '×' + hv;
        document.getElementById('modal').style.display = 'none';
        document.getElementById('w').value = '';
        document.getElementById('h').value = '';
    }

    async function exportImg() {
        const box = document.getElementById('invoice-capture');
        document.body.classList.add('is-capturing');
        
        // تحسين مظهر الحقول قبل التصوير
        const inputs = box.querySelectorAll('input');
        const temps = [];
        inputs.forEach(inp => {
            const s = document.createElement('span');
            s.innerText = inp.value;
            s.style.cssText = window.getComputedStyle(inp).cssText;
            s.style.display = 'inline-block';
            inp.style.display = 'none';
            inp.parentNode.insertBefore(s, inp);
            temps.push({s, inp});
        });

        try {
            const cvs = await html2canvas(box, {
                scale: 3,
                backgroundColor: "#f2f2f7",
                borderRadius: 25
            });
            const link = document.createElement('a');
            link.download = `فاتورة_الدويري_${Date.now()}.png`;
            link.href = cvs.toDataURL('image/png');
            link.click();
        } catch (e) {
            alert('Error creating image');
        }

        // إرجاع الحالة الأصلية
        temps.forEach(t => { t.s.remove(); t.inp.style.display = 'block'; });
        document.body.classList.remove('is-capturing');
    }
</script>

</body>
</html>
