<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eddaouiri Invoice Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary-color: #1e293b;
            --accent-color: #2563eb;
            --success-color: #059669;
            --danger-color: #dc2626;
            --bg-app: #f1f5f9;
            --border-color: #e2e8f0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-app);
            margin: 0;
            padding: 0;
            color: var(--primary-color);
        }

        .app-shell {
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 15px;
        }

        /* Invoice Style */
        .invoice-paper {
            background: #ffffff;
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 40px 25px;
            position: relative;
            overflow: hidden;
        }

        /* Branding Stripe */
        .invoice-paper::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: var(--accent-color);
        }

        header {
            text-align: right;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        header h1 { 
            margin: 0; 
            font-size: 20px; 
            color: var(--primary-color); 
            font-weight: 800;
            text-transform: uppercase;
        }

        header p { margin: 5px 0; font-size: 13px; color: #64748b; }

        .meta-data {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            font-size: 12px;
            color: #475569;
            background: #f8fafc;
            padding: 10px;
            border-radius: 4px;
        }

        table { width: 100%; border-collapse: collapse; }
        
        th { 
            text-align: right; 
            font-size: 12px; 
            text-transform: uppercase; 
            color: #94a3b8; 
            padding: 10px 5px;
            border-bottom: 2px solid var(--border-color);
        }

        td { padding: 15px 5px; border-bottom: 1px solid #f1f5f9; }

        .desc-cell input {
            width: 100%;
            border: none;
            font-size: 14px;
            font-weight: 500;
            color: var(--primary-color);
            background: transparent;
            outline: none;
        }

        .size-btn {
            background: #f1f5f9;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 6px 10px;
            font-size: 12px;
            color: var(--accent-color);
            cursor: pointer;
            text-align: center;
            min-width: 80px;
        }

        .price-input {
            width: 80px;
            border: none;
            font-weight: 700;
            color: var(--primary-color);
            text-align: left;
            font-size: 14px;
            outline: none;
            background: transparent;
        }

        .total-container {
            margin-top: 30px;
            border-top: 2px solid var(--primary-color);
            padding-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .total-label { font-weight: 800; font-size: 14px; }
        .total-amount { font-size: 20px; font-weight: 900; color: var(--accent-color); }

        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 11px;
            color: #94a3b8;
        }

        /* Controls */
        .actions-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: white;
            padding: 15px 20px;
            display: flex;
            gap: 10px;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.05);
            z-index: 100;
        }

        .btn-main {
            flex: 1;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }

        .btn-add { background: var(--primary-color); color: white; }
        .btn-save { background: var(--accent-color); color: white; }

        .btn-delete {
            background: #fee2e2;
            color: var(--danger-color);
            border: none;
            width: 28px; height: 28px;
            border-radius: 6px;
            cursor: pointer;
        }

        /* Modal */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .modal {
            background: white;
            width: 90%;
            max-width: 320px;
            border-radius: 12px;
            padding: 25px;
        }

        .modal h3 { margin-top: 0; font-size: 16px; text-align: center; }

        .modal-grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }

        .modal input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            text-align: center;
            font-size: 16px;
        }

        .btn-confirm {
            background: var(--accent-color);
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 700;
        }

        /* Hidden elements during capture */
        .is-capturing .btn-delete, 
        .is-capturing .actions-bar,
        .is-capturing .size-btn { border: none !important; background: transparent !important; }
        
    </style>
</head>
<body>

<div class="app-shell">
    <div id="invoice-capture" class="invoice-paper">
        <header>
            <h1 contenteditable="true">Abdelkarim Eddaouiri</h1>
            <p contenteditable="true">Menuiserie Aluminium & Vitrage</p>
            <p contenteditable="true" style="font-size: 11px;">Casablanca, Maroc</p>
        </header>

        <div class="meta-data">
            <div>التاريخ: <span id="date-val"></span></div>
            <div id="time-val"></div>
        </div>

        <table>
            <thead>
                <tr>
                    <th width="50%">الوصف</th>
                    <th width="25%">القياس</th>
                    <th width="20%">الثمن</th>
                    <th class="hide-on-save" width="5%"></th>
                </tr>
            </thead>
            <tbody id="items-list">
                <tr>
                    <td class="desc-cell"><input type="text" value="باب ألومنيوم ممتاز"></td>
                    <td><div class="size-btn" onclick="openSizePicker(this)">80 × 220</div></td>
                    <td><input type="number" class="price-input" value="1450" oninput="doMath()"></td>
                    <td class="hide-on-save"><button class="btn-delete" onclick="this.closest('tr').remove(); doMath();">✕</button></td>
                </tr>
            </tbody>
        </table>

        <div class="total-container">
            <div class="total-label">المجموع الصافي</div>
            <div class="total-amount" id="grand-total">1,450.00 DH</div>
        </div>

        <footer>
            <p contenteditable="true">شكراً لتعاملكم معنا. الهاتف: 06 00 00 00 00</p>
        </footer>
    </div>
</div>

<div id="modal-overlay">
    <div class="modal">
        <h3>تحديد المقاسات (cm)</h3>
        <div class="modal-grid">
            <input type="number" id="inp-w" placeholder="العرض">
            <span style="color: #94a3b8;">×</span>
            <input type="number" id="inp-h" placeholder="الطول">
        </div>
        <button class="btn-confirm" onclick="applySize()">تحديث القياس</button>
    </div>
</div>

<div class="actions-bar">
    <button class="btn-main btn-add" onclick="addNewRow()">
        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        إضافة بند
    </button>
    <button class="btn-main btn-save" onclick="saveAsImage()">
        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
        حفظ وتصدير
    </button>
</div>

<script>
    let activeSizeTrigger = null;

    // Update Date/Time
    function updateClock() {
        const d = new Date();
        document.getElementById('date-val').innerText = d.toLocaleDateString('ar-MA');
        document.getElementById('time-val').innerText = d.toLocaleTimeString('ar-MA', {hour:'2-digit', minute:'2-digit'});
    }
    updateClock();

    function addNewRow() {
        const html = `
            <tr>
                <td class="desc-cell"><input type="text" placeholder="أدخل الوصف..."></td>
                <td><div class="size-btn" onclick="openSizePicker(this)">0 × 0</div></td>
                <td><input type="number" class="price-input" value="0" oninput="doMath()"></td>
                <td class="hide-on-save"><button class="btn-delete" onclick="this.closest('tr').remove(); doMath();">✕</button></td>
            </tr>`;
        document.getElementById('items-list').insertAdjacentHTML('beforeend', html);
    }

    function doMath() {
        let total = 0;
        document.querySelectorAll('.price-input').forEach(input => {
            total += parseFloat(input.value || 0);
        });
        document.getElementById('grand-total').innerText = total.toLocaleString('en-US', {minimumFractionDigits: 2}) + ' DH';
    }

    function openSizePicker(el) {
        activeSizeTrigger = el;
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('inp-w').focus();
    }

    function applySize() {
        const w = document.getElementById('inp-w').value || '0';
        const h = document.getElementById('inp-h').value || '0';
        activeSizeTrigger.innerText = `${w} × ${h}`;
        document.getElementById('modal-overlay').style.display = 'none';
        document.getElementById('inp-w').value = '';
        document.getElementById('inp-h').value = '';
    }

    async function saveAsImage() {
        const target = document.getElementById('invoice-capture');
        const hideElements = document.querySelectorAll('.hide-on-save');
        
        // Prepare UI for capture
        document.body.classList.add('is-capturing');
        hideElements.forEach(el => el.style.opacity = '0');

        // Fix inputs (convert to text so they show up perfectly)
        const inputs = target.querySelectorAll('input');
        inputs.forEach(inp => {
            const span = document.createElement('span');
            span.className = 'temp-span';
            span.innerText = inp.value;
            span.style.fontSize = '14px';
            span.style.fontWeight = inp.classList.contains('price-input') ? '900' : '500';
            inp.style.display = 'none';
            inp.parentNode.insertBefore(span, inp);
        });

        const canvas = await html2canvas(target, {
            scale: 3,
            useCORS: true,
            backgroundColor: "#f1f5f9"
        });

        // Restore UI
        document.body.classList.remove('is-capturing');
        hideElements.forEach(el => el.style.opacity = '1');
        target.querySelectorAll('.temp-span').forEach(s => s.remove());
        inputs.forEach(inp => inp.style.display = 'inline-block');

        // Download
        const link = document.createElement('a');
        link.download = `EDDAOUIRI_INV_${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    }
</script>

</body>
</html>
