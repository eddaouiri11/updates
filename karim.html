<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فاتورة عمل - Eddaouiri Abdelkarim</title>
    <!-- مكتبة تحويل الصفحة لصورة -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #2563eb;
            --bg: #f1f5f9;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --ios-red: #ef4444;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
            padding-bottom: 100px;
        }

        /* حاوية الفاتورة - تصميم نقي */
        .invoice-box {
            max-width: 650px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 2px; /* تصميم كلاسيكي أكثر */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .logo-area h1 {
            margin: 0;
            font-size: 24px;
            color: var(--primary);
            letter-spacing: -0.5px;
            outline: none;
        }

        .logo-area p {
            margin: 5px 0 0;
            font-size: 14px;
            color: var(--text-muted);
            outline: none;
        }

        .status-badge {
            background: #dcfce7;
            color: #166534;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            outline: none;
        }

        .date-row {
            margin-bottom: 25px;
            font-size: 14px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        /* قائمة العناصر */
        .items-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .item-info {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .item-name-input {
            border: none;
            font-weight: 600;
            font-size: 16px;
            color: var(--text-main);
            outline: none;
            background: transparent;
            width: 100%;
            margin-bottom: 2px;
        }

        .item-size-display {
            font-size: 13px;
            color: var(--accent);
            cursor: pointer;
            font-weight: 500;
            text-decoration: underline dotted;
        }

        .price-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .item-price-input {
            font-weight: 700;
            color: var(--primary);
            font-size: 16px;
            border: 1px solid transparent;
            outline: none;
            background: transparent;
            width: 90px;
            text-align: left;
            padding: 4px;
        }

        .item-price-input:focus {
            border-bottom-color: var(--accent);
            background: #f8fafc;
        }

        .currency {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: bold;
        }

        /* المجموع */
        .total-section {
            margin-top: 30px;
            background: var(--primary);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .total-label { font-size: 14px; font-weight: 500; }
        .total-val { font-size: 22px; font-weight: 800; }

        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        /* أزرار التحكم السفلى */
        .bottom-actions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 1000;
            width: 90%;
            max-width: 500px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .btn-add { background: white; color: var(--primary); border: 1px solid #ddd; }
        .btn-export { background: var(--accent); color: white; }
        .btn-delete { color: var(--ios-red); background: none; border: none; font-size: 18px; cursor: pointer; padding: 0 10px; margin-right: 10px; }

        /* نافذة القياس */
        #size-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(3px);
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            text-align: center;
        }

        .modal-inputs {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }

        .modal-inputs input {
            width: 90px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            text-align: center;
            font-size: 18px;
        }

        .btn-confirm {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 6px;
            font-weight: 700;
        }

        /* حالة التصوير */
        .is-capturing .bottom-actions,
        .is-capturing .btn-delete { display: none !important; }
        .is-capturing { padding: 0; background: white; }
        .is-capturing .invoice-box { box-shadow: none; border: none; max-width: 100%; }

    </style>
</head>
<body>

    <div class="invoice-box" id="capture-area">
        <header>
            <div class="logo-area">
                <h1 contenteditable="true" spellcheck="false">Eddaouiri Abdelkarim</h1>
                <p contenteditable="true" spellcheck="false">متخصص الألومنيوم والزجاج</p>
            </div>
            <div class="status-badge" contenteditable="true" spellcheck="false">طلب مكتمل</div>
        </header>

        <div class="date-row">
            <strong>التاريخ:</strong> <span id="display-date"></span>
        </div>

        <ul class="items-list" id="items-list">
            <!-- سيتم إضافة العناصر هنا -->
            <li class="item-row">
                <div class="item-info">
                    <input type="text" class="item-name-input" value="باب ألومنيوم" spellcheck="false">
                    <span class="item-size-display" onclick="openSize(this)">80 × 222.5 سم</span>
                </div>
                <div class="price-area">
                    <input type="number" class="item-price-input" value="1400" oninput="updateTotal()">
                    <span class="currency">DH</span>
                    <button class="btn-delete" onclick="removeItem(this)">✕</button>
                </div>
            </li>
        </ul>

        <div class="total-section">
            <span class="total-label">المجموع الإجمالي (Total):</span>
            <span class="total-val" id="grand-total">1,400 DH</span>
        </div>

        <footer>
            <p contenteditable="true" spellcheck="false">نشكركم على اختياركم لخدماتنا | الهاتف: 06 00 00 00 00</p>
        </footer>
    </div>

    <!-- أزرار التحكم -->
    <div class="bottom-actions">
        <button class="btn btn-add" onclick="addNewItem()">
            <span>+</span> إضافة عنصر
        </button>
        <button class="btn btn-export" onclick="saveAsImage()">
            حفظ كصورة (PNG)
        </button>
    </div>

    <!-- مودال القياس -->
    <div id="size-modal">
        <div class="modal-content">
            <h3 style="margin:0">تعديل القياسات</h3>
            <div class="modal-inputs">
                <input type="number" id="width-in" placeholder="عرض">
                <span>×</span>
                <input type="number" id="height-in" placeholder="طول">
            </div>
            <button class="btn-confirm" onclick="applySize()">تحديث</button>
            <button style="background:none; border:none; margin-top:15px; color:var(--text-muted); cursor:pointer" onclick="closeModal()">إلغاء</button>
        </div>
    </div>

    <script>
        let activeSizeSpan = null;

        // وضع التاريخ الحالي
        document.getElementById('display-date').innerText = new Date().toLocaleDateString('ar-MA');

        function addNewItem() {
            const list = document.getElementById('items-list');
            const li = document.createElement('li');
            li.className = 'item-row';
            li.innerHTML = `
                <div class="item-info">
                    <input type="text" class="item-name-input" placeholder="اسم العنصر..." spellcheck="false">
                    <span class="item-size-display" onclick="openSize(this)">0 × 0 سم</span>
                </div>
                <div class="price-area">
                    <input type="number" class="item-price-input" value="0" oninput="updateTotal()">
                    <span class="currency">DH</span>
                    <button class="btn-delete" onclick="removeItem(this)">✕</button>
                </div>
            `;
            list.appendChild(li);
            updateTotal();
        }

        function removeItem(btn) {
            btn.closest('li').remove();
            updateTotal();
        }

        function updateTotal() {
            let total = 0;
            document.querySelectorAll('.item-price-input').forEach(input => {
                total += parseFloat(input.value || 0);
            });
            document.getElementById('grand-total').innerText = total.toLocaleString('en-US') + ' DH';
        }

        function openSize(el) {
            activeSizeSpan = el;
            const current = el.innerText.replace(' سم', '').split(' × ');
            document.getElementById('width-in').value = current[0].trim();
            document.getElementById('height-in').value = current[1].trim();
            document.getElementById('size-modal').style.display = 'flex';
            document.getElementById('width-in').focus();
        }

        function closeModal() {
            document.getElementById('size-modal').style.display = 'none';
        }

        function applySize() {
            const w = document.getElementById('width-in').value || '0';
            const h = document.getElementById('height-in').value || '0';
            activeSizeSpan.innerText = `${w} × ${h} سم`;
            closeModal();
        }

        async function saveAsImage() {
            const area = document.getElementById('capture-area');
            document.body.classList.add('is-capturing');

            // تحويل المدخلات لنصوص عادية مؤقتاً لتحسين شكل الصورة
            const inputs = area.querySelectorAll('input');
            const placeholders = [];
            inputs.forEach(input => {
                const span = document.createElement('span');
                span.innerText = input.value || input.placeholder;
                span.style.cssText = window.getComputedStyle(input).cssText;
                span.style.border = 'none';
                span.style.background = 'none';
                input.style.display = 'none';
                input.parentNode.insertBefore(span, input);
                placeholders.push({s: span, i: input});
            });

            try {
                const canvas = await html2canvas(area, {
                    scale: 3,
                    useCORS: true,
                    backgroundColor: "#ffffff"
                });
                const link = document.createElement('a');
                link.download = `فاتورة_الدويري_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (err) {
                console.error("خطأ في الحفظ:", err);
            } finally {
                // إرجاع الحالة الأصلية
                placeholders.forEach(item => {
                    item.s.remove();
                    item.i.style.display = 'inline-block';
                });
                document.body.classList.remove('is-capturing');
            }
        }

        // إغلاق المودال عند الضغط خارجاً
        window.onclick = function(event) {
            if (event.target == document.getElementById('size-modal')) closeModal();
        }

        updateTotal();
    </script>
</body>
</html>
