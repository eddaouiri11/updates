<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Finance Pro | Precision Mobile Calculator</title>
    <style>
        :root {
            /* Professional Color Palette - Dark Mode Default */
            --bg-primary: #000000;
            --bg-secondary: #1c1c1e;
            --accent-primary: #0a84ff;
            --accent-secondary: #ff9f0a;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --btn-number: #2c2c2e;
            --btn-number-hover: #3a3a3c;
            --btn-function: #48484a;
            --border-subtle: rgba(255, 255, 255, 0.1);
            --transition-speed: 0.2s;
            --history-bg: rgba(28, 28, 30, 0.98);
            --safe-area-inset-bottom: env(safe-area-inset-bottom, 20px);
        }

        [data-theme="light"] {
            --bg-primary: #f2f2f7;
            --bg-secondary: #ffffff;
            --accent-primary: #007aff;
            --accent-secondary: #ff9500;
            --text-main: #1c1c1e;
            --text-muted: #8e8e93;
            --btn-number: #ffffff;
            --btn-number-hover: #e5e5ea;
            --btn-function: #d1d1d6;
            --border-subtle: rgba(0, 0, 0, 0.05);
            --history-bg: rgba(255, 255, 255, 0.98);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", sans-serif;
            touch-action: manipulation; /* Prevents double-tap zoom */
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background-color 0.4s ease;
        }

        /* App Container */
        .app-shell {
            width: 100%;
            max-width: 440px;
            height: 100vh; /* Mobile Default */
            max-height: 900px;
            background-color: var(--bg-primary);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 1px solid var(--border-subtle);
            border-radius: 48px;
            padding: 20px;
            padding-bottom: var(--safe-area-inset-bottom);
            overflow: hidden;
        }

        @media (max-width: 500px) {
            .app-shell {
                height: 100vh;
                max-height: none;
                border-radius: 0;
                border: none;
            }
        }

        /* Top Navigation */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5px 10px;
            z-index: 10;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 12px;
            border-radius: 12px;
            transition: all var(--transition-speed);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover { color: var(--text-main); }
        .nav-btn.active { color: var(--accent-primary); }

        /* Display Area */
        .display {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 10px 10px 30px;
            text-align: right;
            word-break: break-all;
            min-height: 200px;
        }

        .display-secondary {
            color: var(--text-muted);
            font-size: 1.25rem;
            min-height: 1.5rem;
            margin-bottom: 8px;
            font-weight: 400;
            opacity: 0.8;
        }

        .display-primary {
            color: var(--text-main);
            font-size: 5.5rem;
            font-weight: 300;
            line-height: 1;
            letter-spacing: -2px;
            transition: font-size 0.1s ease;
            width: 100%;
        }

        .mem-indicator {
            font-size: 0.7rem;
            color: var(--accent-primary);
            font-weight: 700;
            margin-top: 8px;
            opacity: 0;
            letter-spacing: 1px;
            transition: opacity 0.2s;
        }
        .mem-indicator.visible { opacity: 1; }

        /* Keypad Grid */
        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding-bottom: 10px;
        }

        .scientific-rows {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 12px;
        }

        .app-shell.scientific .scientific-rows { display: grid; }

        /* Professional Buttons */
        .btn {
            height: 80px; /* Precise height for alignment */
            border: none;
            border-radius: 40px;
            font-size: 1.8rem;
            font-weight: 400;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.15s, transform 0.05s;
            position: relative;
            user-select: none;
        }

        @media (max-height: 700px) {
            .btn { height: 65px; font-size: 1.5rem; }
            .display-primary { font-size: 4rem; }
        }

        .btn:active {
            transform: scale(0.94);
            filter: brightness(1.15);
        }

        .btn-num { background-color: var(--btn-number); color: var(--text-main); }
        .btn-func { background-color: var(--btn-function); color: var(--text-main); font-size: 1.4rem; }
        .btn-op { background-color: var(--accent-secondary); color: white; }
        .btn-op.active { background-color: white; color: var(--accent-secondary); }

        .btn-zero {
            grid-column: span 2;
            justify-content: flex-start;
            padding-left: 32px;
        }

        .btn-text { font-size: 1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        /* History Side Panel */
        .history-panel {
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background-color: var(--history-bg);
            backdrop-filter: blur(20px);
            z-index: 100;
            padding: 60px 24px 40px;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
        }

        .history-panel.open { transform: translateX(0); }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .history-entry {
            padding: 16px 0;
            border-bottom: 1px solid var(--border-subtle);
            text-align: right;
        }

        .history-entry-expr { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 6px; }
        .history-entry-res { color: var(--text-main); font-size: 1.6rem; font-weight: 500; }

        /* SVG Icons Styling */
        svg {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>

    <div class="app-shell" id="app">
        <!-- Navigation -->
        <nav class="nav-bar">
            <div style="display: flex; gap: 4px;">
                <button class="nav-btn" id="theme-btn" title="Toggle Theme">
                    <svg viewBox="0 0 24 24" id="theme-icon-sun" style="display:none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg viewBox="0 0 24 24" id="theme-icon-moon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
                <button class="nav-btn" id="sound-btn" title="Toggle Sound">
                    <svg viewBox="0 0 24 24" id="sound-icon-on"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                    <svg viewBox="0 0 24 24" id="sound-icon-off" style="display:none;"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
                </button>
            </div>
            <div style="display: flex; gap: 4px;">
                <button class="nav-btn" id="sci-btn" title="Scientific Mode">
                    <svg viewBox="0 0 24 24"><path d="M2 20h20M7 20v-4m5 4V10m5 10V4"></path></svg>
                </button>
                <button class="nav-btn" id="history-btn" title="View History">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                </button>
            </div>
        </nav>

        <!-- Display Area -->
        <main class="display">
            <div class="display-secondary" id="secondary-display"></div>
            <div class="display-primary" id="primary-display">0</div>
            <div class="mem-indicator" id="mem-label">MEMORY ACTIVE</div>
        </main>

        <!-- Keypad -->
        <section class="keypad">
            <!-- Scientific Row (Toggleable) -->
            <div class="scientific-rows">
                <button class="btn btn-func btn-text" data-type="sci" data-value="mc">mc</button>
                <button class="btn btn-func btn-text" data-type="sci" data-value="mr">mr</button>
                <button class="btn btn-func btn-text" data-type="sci" data-value="m-plus">m+</button>
                <button class="btn btn-func btn-text" data-type="sci" data-value="m-minus">m-</button>
            </div>

            <!-- Standard Rows -->
            <button class="btn btn-func" data-type="clear" id="ac-btn">AC</button>
            <button class="btn btn-func" data-type="negate">
                <svg viewBox="0 0 24 24"><path d="M5 12h14m-7-7v14"></path><path d="M5 12h14" style="transform: translateY(4px); opacity: 0.3;"></path></svg>
            </button>
            <button class="btn btn-func" data-type="percent">
                <svg viewBox="0 0 24 24"><line x1="19" y1="5" x2="5" y2="19"></line><circle cx="6.5" cy="6.5" r="2.5"></circle><circle cx="17.5" cy="17.5" r="2.5"></circle></svg>
            </button>
            <button class="btn btn-op" data-type="operator" data-value="/">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="7" r="1"></circle><line x1="5" y1="12" x2="19" y2="12"></line><circle cx="12" cy="17" r="1"></circle></svg>
            </button>

            <button class="btn btn-num" data-type="number" data-value="7">7</button>
            <button class="btn btn-num" data-type="number" data-value="8">8</button>
            <button class="btn btn-num" data-type="number" data-value="9">9</button>
            <button class="btn btn-op" data-type="operator" data-value="*">
                <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>

            <button class="btn btn-num" data-type="number" data-value="4">4</button>
            <button class="btn btn-num" data-type="number" data-value="5">5</button>
            <button class="btn btn-num" data-type="number" data-value="6">6</button>
            <button class="btn btn-op" data-type="operator" data-value="-">
                <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>

            <button class="btn btn-num" data-type="number" data-value="1">1</button>
            <button class="btn btn-num" data-type="number" data-value="2">2</button>
            <button class="btn btn-num" data-type="number" data-value="3">3</button>
            <button class="btn btn-op" data-type="operator" data-value="+">
                <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>

            <button class="btn btn-num btn-zero" data-type="number" data-value="0">0</button>
            <button class="btn btn-num" data-type="decimal">.</button>
            <button class="btn btn-op" data-type="equals">
                <svg viewBox="0 0 24 24"><line x1="5" y1="9" x2="19" y2="9"></line><line x1="5" y1="15" x2="19" y2="15"></line></svg>
            </button>
        </section>

        <!-- History Overlay -->
        <aside class="history-panel" id="history-panel">
            <div class="history-header">
                <h2 style="font-weight: 600; font-size: 1.5rem;">Recent History</h2>
                <button class="nav-btn" id="history-close-btn">
                    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="history-list" id="history-list"></div>
            <button class="btn btn-func btn-text" style="border-radius: 18px; height: 56px; margin-top: 20px; width:100%;" id="clear-history-btn">Clear History</button>
        </aside>
    </div>

    <script>
        /**
         * STABLE PRODUCTION ENGINE
         */
        
        const AudioEngine = (() => {
            let context = null;
            let isMuted = localStorage.getItem('calc_muted') === 'true';

            const init = () => {
                if (!context) {
                    context = new (window.AudioContext || window.webkitAudioContext)();
                }
            };

            const playTone = (freq, type, decay, gainVal = 0.1) => {
                if (isMuted) return;
                init();
                if (context.state === 'suspended') context.resume();

                const osc = context.createOscillator();
                const gain = context.createGain();
                
                osc.type = type;
                osc.frequency.setValueAtTime(freq, context.currentTime);
                
                gain.gain.setValueAtTime(gainVal, context.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, context.currentTime + decay);
                
                osc.connect(gain);
                gain.connect(context.destination);
                
                osc.start();
                osc.stop(context.currentTime + decay);
            };

            return {
                num: () => playTone(800, 'sine', 0.05, 0.05),
                op: () => playTone(600, 'sine', 0.1, 0.08),
                eq: () => playTone(1200, 'sine', 0.15, 0.05),
                clear: () => playTone(400, 'sine', 0.2, 0.1),
                err: () => playTone(150, 'triangle', 0.3, 0.1),
                toggle: () => {
                    isMuted = !isMuted;
                    localStorage.setItem('calc_muted', isMuted);
                    return isMuted;
                },
                getMuted: () => isMuted
            };
        })();

        const Calculator = {
            current: '0',
            previous: null,
            operator: null,
            waitingForNext: false,
            memory: 0,
            history: JSON.parse(localStorage.getItem('fin_history_v2')) || [],

            reset() {
                this.current = '0';
                this.previous = null;
                this.operator = null;
                this.waitingForNext = false;
            },

            safeParse(val) {
                const n = parseFloat(val);
                return isNaN(n) ? 0 : n;
            },

            inputDigit(digit) {
                if (this.current === 'Error') this.reset();
                
                if (this.waitingForNext) {
                    this.current = String(digit);
                    this.waitingForNext = false;
                } else {
                    if (this.current === '0') {
                        this.current = String(digit);
                    } else if (this.current.length < 15) {
                        this.current += digit;
                    }
                }
            },

            inputDecimal() {
                if (this.current === 'Error') this.reset();
                if (this.waitingForNext) {
                    this.current = '0.';
                    this.waitingForNext = false;
                    return;
                }
                if (!this.current.includes('.')) {
                    this.current += '.';
                }
            },

            setOperator(nextOp) {
                if (this.current === 'Error') return;
                const inputValue = this.safeParse(this.current);

                if (this.operator && this.waitingForNext) {
                    this.operator = nextOp;
                    return;
                }

                if (this.previous === null) {
                    this.previous = inputValue;
                } else if (this.operator) {
                    const result = this.calculate();
                    this.current = String(result);
                    this.previous = result;
                }

                this.waitingForNext = true;
                this.operator = nextOp;
            },

            calculate() {
                const first = this.previous;
                const second = this.safeParse(this.current);
                let result = 0;

                if (this.operator === '/' && second === 0) {
                    AudioEngine.err();
                    return 'Error';
                }

                switch (this.operator) {
                    case '+': result = first + second; break;
                    case '-': result = first - second; break;
                    case '*': result = first * second; break;
                    case '/': result = first / second; break;
                    default: return second;
                }

                // Precision handling (prevents 0.1 + 0.2 = 0.300000004)
                const finalResult = Math.round(result * 1e12) / 1e12;
                this.addHistory(`${first} ${this.operator} ${second}`, finalResult);
                return finalResult;
            },

            addHistory(expr, res) {
                if (res === 'Error') return;
                this.history.unshift({ expr, res, time: Date.now() });
                if (this.history.length > 30) this.history.pop();
                localStorage.setItem('fin_history_v2', JSON.stringify(this.history));
                UI.renderHistory();
            }
        };

        const UI = {
            primary: document.getElementById('primary-display'),
            secondary: document.getElementById('secondary-display'),
            mem: document.getElementById('mem-label'),
            app: document.getElementById('app'),
            acBtn: document.getElementById('ac-btn'),
            historyList: document.getElementById('history-list'),

            init() {
                this.renderHistory();
                this.updateDisplay();
                this.syncSoundIcon();
            },

            updateDisplay() {
                let displayVal = Calculator.current;
                
                // Dynamic font sizing
                const len = displayVal.length;
                if (len > 12) this.primary.style.fontSize = '2.2rem';
                else if (len > 9) this.primary.style.fontSize = '3.2rem';
                else if (len > 6) this.primary.style.fontSize = '4.2rem';
                else this.primary.style.fontSize = '5.5rem';

                this.primary.innerText = this.format(displayVal);
                
                if (Calculator.operator) {
                    this.secondary.innerText = `${this.format(Calculator.previous)} ${Calculator.operator}`;
                } else {
                    this.secondary.innerText = '';
                }

                this.acBtn.innerText = (Calculator.current === '0' && !Calculator.previous) ? 'AC' : 'C';
                this.mem.classList.toggle('visible', Calculator.memory !== 0);

                // Operator highlight
                document.querySelectorAll('.btn-op').forEach(b => {
                    b.classList.toggle('active', b.dataset.value === Calculator.operator && Calculator.waitingForNext);
                });
            },

            format(val) {
                if (val === 'Error') return 'Error';
                if (val === null || val === undefined) return '0';
                const parts = String(val).split('.');
                parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
                return parts.join('.');
            },

            renderHistory() {
                this.historyList.innerHTML = Calculator.history.map((h, i) => `
                    <div class="history-entry" onclick="UI.loadHistory(${i})">
                        <div class="history-entry-expr">${h.expr} =</div>
                        <div class="history-entry-res">${this.format(h.res)}</div>
                    </div>
                `).join('');
            },

            loadHistory(index) {
                const item = Calculator.history[index];
                Calculator.current = String(item.res);
                Calculator.waitingForNext = true;
                this.updateDisplay();
                document.getElementById('history-panel').classList.remove('open');
                AudioEngine.num();
            },

            syncSoundIcon() {
                const muted = AudioEngine.getMuted();
                document.getElementById('sound-icon-on').style.display = muted ? 'none' : 'block';
                document.getElementById('sound-icon-off').style.display = muted ? 'block' : 'none';
            }
        };

        /**
         * HANDLERS
         */
        document.body.addEventListener('click', (e) => {
            const btn = e.target.closest('.btn');
            if (!btn) return;

            const { type, value } = btn.dataset;
            
            switch(type) {
                case 'number': 
                    AudioEngine.num();
                    Calculator.inputDigit(value); 
                    break;
                case 'decimal': 
                    AudioEngine.num();
                    Calculator.inputDecimal(); 
                    break;
                case 'operator': 
                    AudioEngine.op();
                    Calculator.setOperator(value); 
                    break;
                case 'equals': 
                    AudioEngine.eq();
                    if (Calculator.operator) {
                        const res = Calculator.calculate();
                        Calculator.current = String(res);
                        Calculator.previous = null;
                        Calculator.operator = null;
                        Calculator.waitingForNext = true;
                    }
                    break;
                case 'clear': 
                    AudioEngine.clear();
                    if (Calculator.current !== '0') {
                        Calculator.current = '0';
                    } else {
                        Calculator.reset();
                    }
                    break;
                case 'negate': 
                    AudioEngine.op();
                    if (Calculator.current !== '0' && Calculator.current !== 'Error') {
                        Calculator.current = String(Calculator.safeParse(Calculator.current) * -1);
                    }
                    break;
                case 'percent':
                    AudioEngine.op();
                    if (Calculator.current !== 'Error') {
                        Calculator.current = String(Calculator.safeParse(Calculator.current) / 100);
                    }
                    break;
                case 'sci':
                    AudioEngine.op();
                    const cur = Calculator.safeParse(Calculator.current);
                    if (value === 'm-plus') Calculator.memory += cur;
                    if (value === 'm-minus') Calculator.memory -= cur;
                    if (value === 'mr') { Calculator.current = String(Calculator.memory); Calculator.waitingForNext = true; }
                    if (value === 'mc') Calculator.memory = 0;
                    break;
            }
            UI.updateDisplay();
        });

        // Interface controls
        document.getElementById('theme-btn').onclick = () => {
            const isLight = document.documentElement.getAttribute('data-theme') === 'light';
            document.documentElement.setAttribute('data-theme', isLight ? 'dark' : 'light');
            document.getElementById('theme-icon-sun').style.display = isLight ? 'none' : 'block';
            document.getElementById('theme-icon-moon').style.display = isLight ? 'block' : 'none';
        };

        document.getElementById('sound-btn').onclick = () => {
            AudioEngine.toggle();
            UI.syncSoundIcon();
        };

        document.getElementById('sci-btn').onclick = () => UI.app.classList.toggle('scientific');
        document.getElementById('history-btn').onclick = () => document.getElementById('history-panel').classList.add('open');
        document.getElementById('history-close-btn').onclick = () => document.getElementById('history-panel').classList.remove('open');
        document.getElementById('clear-history-btn').onclick = () => {
            Calculator.history = [];
            localStorage.removeItem('fin_history_v2');
            UI.renderHistory();
            AudioEngine.clear();
        };

        // Keyboard Support (Safe mapping)
        window.addEventListener('keydown', (e) => {
            const key = e.key;
            if (/[0-9]/.test(key)) Calculator.inputDigit(key);
            else if (key === '.') Calculator.inputDecimal();
            else if (['+', '-', '*', '/'].includes(key)) Calculator.setOperator(key);
            else if (key === 'Enter' || key === '=') {
                if (Calculator.operator) {
                    const res = Calculator.calculate();
                    Calculator.current = String(res);
                    Calculator.previous = null;
                    Calculator.operator = null;
                    Calculator.waitingForNext = true;
                }
            } else if (key === 'Escape') Calculator.reset();
            else if (key === 'Backspace') {
                Calculator.current = Calculator.current.length > 1 ? Calculator.current.slice(0, -1) : '0';
            }
            UI.updateDisplay();
        });

        // Initialize UI
        UI.init();

    </script>
</body>
</html>
