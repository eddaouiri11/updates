<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Calculator | Ultra Edition</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --calc-bg: rgba(20, 20, 25, 0.7);
            --btn-gray: rgba(255, 255, 255, 0.1);
            --btn-gray-hover: rgba(255, 255, 255, 0.2);
            --btn-orange: #ff9f0a;
            --btn-orange-glow: rgba(255, 159, 10, 0.5);
            --text-white: #ffffff;
            --neon-green: #39ff14;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #e0eafc, #cfdef3);
            --calc-bg: rgba(255, 255, 255, 0.8);
            --btn-gray: rgba(0, 0, 0, 0.05);
            --btn-gray-hover: rgba(0, 0, 0, 0.1);
            --text-white: #1c1c1e;
            --glass-border: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            user-select: none;
        }

        body {
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Main Container */
        .calculator {
            width: 100%;
            max-width: 380px;
            background: var(--calc-bg);
            backdrop-filter: blur(30px);
            border-radius: 40px;
            padding: 25px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6), inset 0 0 0 1px var(--glass-border);
            position: relative;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .calculator.scientific {
            max-width: 700px;
        }

        /* Controls Area */
        .top-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .icon-btn {
            background: rgba(255,255,255,0.05);
            border: none;
            color: var(--text-white);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .icon-btn:hover { background: rgba(255,255,255,0.15); }
        .icon-btn.active { color: var(--btn-orange); }

        /* Display */
        .display-container {
            text-align: right;
            padding: 20px 10px;
            min-height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .prev-calc {
            color: rgba(255,255,255,0.4);
            font-size: 1.1rem;
            min-height: 1.5rem;
            transition: 0.3s;
        }

        .curr-input {
            color: var(--text-white);
            font-size: 4.5rem;
            font-weight: 200;
            white-space: nowrap;
            overflow: hidden;
            transition: font-size 0.2s ease;
        }

        /* Memory Buttons Row */
        .memory-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .mem-btn {
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--btn-orange);
            background: transparent;
            border: 1px solid rgba(255, 159, 10, 0.2);
            border-radius: 10px;
            padding: 5px;
            cursor: pointer;
        }

        /* Buttons Grid */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .calculator.scientific .buttons-grid {
            grid-template-columns: repeat(6, 1fr);
        }

        button.main-btn {
            aspect-ratio: 1;
            border-radius: 50%;
            border: none;
            font-size: 1.6rem;
            font-weight: 400;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            background: var(--btn-gray);
            color: var(--text-white);
            transition: transform 0.1s, background 0.3s, box-shadow 0.3s;
        }

        button.main-btn:active {
            transform: scale(0.9);
        }

        .btn-light { background: rgba(255,255,255,0.7); color: #000; }
        .btn-orange { 
            background: var(--btn-orange); 
            color: white;
            box-shadow: 0 0 15px var(--btn-orange-glow);
        }

        .btn-orange.active-op {
            background: white;
            color: var(--btn-orange);
        }

        .btn-equal {
            background: var(--btn-orange);
            box-shadow: 0 0 25px var(--btn-orange-glow);
            font-weight: bold;
        }

        .btn-zero {
            grid-column: span 2;
            aspect-ratio: auto;
            border-radius: 50px;
            padding-left: 30px;
            justify-content: flex-start;
        }

        .sci-btn {
            display: none;
            font-size: 1rem;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
        }

        .calculator.scientific .sci-btn { display: flex; justify-content: center; align-items: center; }

        /* History Panel */
        .history-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--calc-bg);
            backdrop-filter: blur(40px);
            border-radius: 40px;
            padding: 30px;
            transform: translateX(100%);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .history-panel.active {
            transform: translateX(0);
            opacity: 1;
        }

        .history-list {
            flex-grow: 1;
            overflow-y: auto;
            margin-top: 20px;
        }

        .history-item {
            text-align: right;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
        }

        .history-item .expr { color: rgba(255,255,255,0.5); font-size: 0.9rem; }
        .history-item .res { color: var(--text-white); font-size: 1.2rem; font-weight: bold; }

        /* Vibrate Visual feedback */
        .vibrate { animation: shake 0.15s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            75% { transform: translateX(2px); }
        }

        @media (max-width: 450px) {
            .calculator { max-width: 90vw; }
            .curr-input { font-size: 3.5rem; }
        }
    </style>
</head>
<body>

    <div class="calculator" id="calculator">
        <div class="top-controls">
            <button class="icon-btn" id="theme-toggle" title="Toggle Theme">🌓</button>
            <button class="icon-btn" id="sci-toggle" title="Scientific Mode">⚛️</button>
            <button class="icon-btn" id="sound-toggle" title="Toggle Sound">🔊</button>
            <button class="icon-btn" id="history-open" title="History">🕒</button>
        </div>

        <div class="display-container" id="swipe-area">
            <div class="prev-calc" id="prev-display"></div>
            <div class="curr-input" id="curr-display">0</div>
        </div>

        <div class="memory-row">
            <button class="mem-btn" data-action="mc">MC</button>
            <button class="mem-btn" data-action="mr">MR</button>
            <button class="mem-btn" data-action="m-plus">M+</button>
            <button class="mem-btn" data-action="m-minus">M-</button>
        </div>

        <div class="buttons-grid">
            <!-- Row 1: Sci + Basic -->
            <button class="main-btn sci-btn" data-action="sin">sin</button>
            <button class="main-btn sci-btn" data-action="cos">cos</button>
            <button class="main-btn btn-light" data-action="clear" id="btn-ac">AC</button>
            <button class="main-btn btn-light" data-action="negate">+/-</button>
            <button class="main-btn btn-light" data-action="percent">%</button>
            <button class="main-btn btn-orange" data-action="operator" data-val="/">÷</button>

            <!-- Row 2 -->
            <button class="main-btn sci-btn" data-action="tan">tan</button>
            <button class="main-btn sci-btn" data-action="sqrt">√</button>
            <button class="main-btn" data-action="number">7</button>
            <button class="main-btn" data-action="number">8</button>
            <button class="main-btn" data-action="number">9</button>
            <button class="main-btn btn-orange" data-action="operator" data-val="*">×</button>

            <!-- Row 3 -->
            <button class="main-btn sci-btn" data-action="pi">π</button>
            <button class="main-btn sci-btn" data-action="pow">x²</button>
            <button class="main-btn" data-action="number">4</button>
            <button class="main-btn" data-action="number">5</button>
            <button class="main-btn" data-action="number">6</button>
            <button class="main-btn btn-orange" data-action="operator" data-val="-">−</button>

            <!-- Row 4 -->
            <button class="main-btn sci-btn" data-action="log">log</button>
            <button class="main-btn sci-btn" data-action="fact">x!</button>
            <button class="main-btn" data-action="number">1</button>
            <button class="main-btn" data-action="number">2</button>
            <button class="main-btn" data-action="number">3</button>
            <button class="main-btn btn-orange" data-action="operator" data-val="+">+</button>

            <!-- Row 5 -->
            <button class="main-btn sci-btn" data-action="rand">rand</button>
            <button class="main-btn sci-btn" data-action="e">e</button>
            <button class="main-btn btn-zero" data-action="number">0</button>
            <button class="main-btn" data-action="decimal">.</button>
            <button class="main-btn btn-equal" data-action="calculate">=</button>
        </div>

        <!-- History Overlay -->
        <div class="history-panel" id="history-panel">
            <div class="top-controls">
                <button class="icon-btn" id="history-close">✕</button>
                <h3 style="color:white; font-weight: 300;">History</h3>
                <button class="icon-btn" id="history-clear">🗑️</button>
            </div>
            <div class="history-list" id="history-list"></div>
        </div>
    </div>

    <script>
        /**
         * AUDIO ENGINE (Web Audio API)
         * Generates synthetic sounds to ensure zero latency and zero external assets
         */
        const AudioEngine = (() => {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            let muted = false;

            const playTone = (freq, type, duration, vol) => {
                if (muted) return;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(vol, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            };

            return {
                click: () => playTone(800, 'sine', 0.1, 0.1),
                op: () => playTone(600, 'triangle', 0.15, 0.1),
                equal: () => playTone(1200, 'sine', 0.2, 0.1),
                toggleMute: () => { muted = !muted; return muted; }
            };
        })();

        /**
         * CALCULATOR LOGIC
         */
        const state = {
            curr: '0',
            prev: '',
            op: null,
            waiting: false,
            memory: 0,
            history: JSON.parse(localStorage.getItem('pro_calc_history')) || []
        };

        const display = document.getElementById('curr-display');
        const prevDisplay = document.getElementById('prev-display');
        const calcEl = document.getElementById('calculator');

        // Logic Functions
        const updateUI = () => {
            display.innerText = state.curr;
            prevDisplay.innerText = state.op ? `${state.prev} ${state.op}` : '';
            
            // Font Scaling
            const len = state.curr.length;
            if (len > 6) display.style.fontSize = '3rem';
            else if (len > 9) display.style.fontSize = '2rem';
            else display.style.fontSize = '4.5rem';
        };

        const pushToHistory = (expr, res) => {
            state.history.unshift({ expr, res });
            if (state.history.length > 30) state.history.pop();
            localStorage.setItem('pro_calc_history', JSON.stringify(state.history));
            renderHistory();
        };

        const renderHistory = () => {
            const list = document.getElementById('history-list');
            list.innerHTML = state.history.map((item, idx) => `
                <div class="history-item" onclick="loadHistory(${idx})">
                    <div class="expr">${item.expr}</div>
                    <div class="res">${item.res}</div>
                </div>
            `).join('');
        };

        window.loadHistory = (idx) => {
            state.curr = String(state.history[idx].res);
            updateUI();
            toggleHistory(false);
        };

        const calculate = () => {
            if (!state.op || state.waiting) return;
            const a = parseFloat(state.prev);
            const b = parseFloat(state.curr);
            let res = 0;

            switch(state.op) {
                case '+': res = a + b; break;
                case '-': res = a - b; break;
                case '*': res = a * b; break;
                case '/': res = b === 0 ? "Error" : a / b; break;
            }

            if (res !== "Error") res = parseFloat(res.toFixed(10));
            
            pushToHistory(`${a} ${state.op} ${b} =`, res);
            state.curr = String(res);
            state.prev = '';
            state.op = null;
            state.waiting = false;
        };

        // Handlers
        const handleInput = (action, val, rawVal) => {
            // Visual feedback
            calcEl.classList.remove('vibrate');
            void calcEl.offsetWidth; // Trigger reflow
            calcEl.classList.add('vibrate');

            switch(action) {
                case 'number':
                    AudioEngine.click();
                    if (state.waiting) {
                        state.curr = val;
                        state.waiting = false;
                    } else {
                        state.curr = state.curr === '0' ? val : state.curr + val;
                    }
                    break;
                
                case 'operator':
                    AudioEngine.op();
                    if (state.op && !state.waiting) calculate();
                    state.prev = state.curr;
                    state.op = rawVal;
                    state.waiting = true;
                    break;

                case 'calculate':
                    AudioEngine.equal();
                    calculate();
                    break;

                case 'clear':
                    AudioEngine.click();
                    state.curr = '0';
                    state.prev = '';
                    state.op = null;
                    break;

                case 'decimal':
                    if (!state.curr.includes('.')) state.curr += '.';
                    break;

                case 'negate':
                    state.curr = String(parseFloat(state.curr) * -1);
                    break;

                case 'percent':
                    state.curr = String(parseFloat(state.curr) / 100);
                    break;

                case 'm-plus': state.memory += parseFloat(state.curr); break;
                case 'm-minus': state.memory -= parseFloat(state.curr); break;
                case 'mr': state.curr = String(state.memory); break;
                case 'mc': state.memory = 0; break;

                // Scientific functions
                case 'sin': state.curr = String(Math.sin(parseFloat(state.curr)).toFixed(8)); break;
                case 'cos': state.curr = String(Math.cos(parseFloat(state.curr)).toFixed(8)); break;
                case 'tan': state.curr = String(Math.tan(parseFloat(state.curr)).toFixed(8)); break;
                case 'sqrt': state.curr = String(Math.sqrt(parseFloat(state.curr)).toFixed(8)); break;
                case 'pow': state.curr = String(Math.pow(parseFloat(state.curr), 2)); break;
                case 'log': state.curr = String(Math.log10(parseFloat(state.curr)).toFixed(8)); break;
                case 'fact': 
                    let f = 1, n = parseInt(state.curr);
                    for(let i=2; i<=n; i++) f *= i;
                    state.curr = String(f);
                    break;
                case 'pi': state.curr = String(Math.PI.toFixed(8)); break;
                case 'e': state.curr = String(Math.E.toFixed(8)); break;
                case 'rand': state.curr = String(Math.random().toFixed(4)); break;
            }
            updateUI();
        };

        /**
         * UI INTERACTIONS
         */
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                handleInput(btn.dataset.action, btn.innerText, btn.dataset.val);
            });
        });

        // Toggle History
        const toggleHistory = (show) => {
            document.getElementById('history-panel').classList.toggle('active', show);
        };
        document.getElementById('history-open').onclick = () => toggleHistory(true);
        document.getElementById('history-close').onclick = () => toggleHistory(false);
        document.getElementById('history-clear').onclick = () => {
            state.history = [];
            localStorage.removeItem('pro_calc_history');
            renderHistory();
        };

        // Long Press AC to Clear All
        let acTimer;
        const acBtn = document.getElementById('btn-ac');
        acBtn.onmousedown = () => acTimer = setTimeout(() => {
            state.history = [];
            renderHistory();
            AudioEngine.equal();
        }, 800);
        acBtn.onmouseup = () => clearTimeout(acTimer);

        // Scientific Toggle
        document.getElementById('sci-toggle').onclick = (e) => {
            calcEl.classList.toggle('scientific');
            e.target.classList.toggle('active');
        };

        // Sound Toggle
        document.getElementById('sound-toggle').onclick = (e) => {
            const isMuted = AudioEngine.toggleMute();
            e.target.innerText = isMuted ? '🔇' : '🔊';
        };

        // Theme Toggle
        document.getElementById('theme-toggle').onclick = () => {
            const current = document.body.getAttribute('data-theme');
            document.body.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
        };

        // Swipe Gesture for History (on display area)
        let touchStart = 0;
        const swipeArea = document.getElementById('swipe-area');
        swipeArea.addEventListener('touchstart', e => touchStart = e.changedTouches[0].screenX);
        swipeArea.addEventListener('touchend', e => {
            if (e.changedTouches[0].screenX < touchStart - 50) toggleHistory(true);
        });

        // Init
        renderHistory();
        updateUI();

        // Keyboard support
        window.addEventListener('keydown', (e) => {
            if (/[0-9]/.test(e.key)) handleInput('number', e.key);
            if (['+', '-', '*', '/'].includes(e.key)) handleInput('operator', null, e.key);
            if (e.key === 'Enter') handleInput('calculate');
            if (e.key === 'Escape') handleInput('clear');
        });

    </script>
</body>
</html>
