<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance Pro | Precision Calculator</title>
    <style>
        :root {
            /* Professional Color Palette - Dark Mode Default */
            --bg-primary: #000000;
            --bg-secondary: #1c1c1e;
            --accent-primary: #0a84ff;
            --accent-secondary: #ff9f0a;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --btn-number: #2c2c2e;
            --btn-number-hover: #3a3a3c;
            --btn-function: #48484a;
            --border-subtle: rgba(255, 255, 255, 0.1);
            --transition-speed: 0.2s;
            --history-bg: rgba(28, 28, 30, 0.95);
        }

        [data-theme="light"] {
            --bg-primary: #f2f2f7;
            --bg-secondary: #ffffff;
            --accent-primary: #007aff;
            --accent-secondary: #ff9500;
            --text-main: #1c1c1e;
            --text-muted: #8e8e93;
            --btn-number: #ffffff;
            --btn-number-hover: #e5e5ea;
            --btn-function: #d1d1d6;
            --border-subtle: rgba(0, 0, 0, 0.05);
            --history-bg: rgba(255, 255, 255, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background-color 0.4s ease;
        }

        /* App Container */
        .app-shell {
            width: 100%;
            max-width: 400px;
            height: 820px;
            background-color: var(--bg-primary);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 1px solid var(--border-subtle);
            border-radius: 48px;
            padding: 20px;
            overflow: hidden;
        }

        @media (max-height: 850px) {
            .app-shell { height: 100vh; border-radius: 0; border: none; }
        }

        /* Top Navigation */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 10px 20px;
            z-index: 10;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            border-radius: 12px;
            transition: all var(--transition-speed);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover {
            color: var(--text-main);
            background-color: var(--btn-number-hover);
        }

        .nav-btn.active {
            color: var(--accent-primary);
        }

        /* Display Area */
        .display {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 20px 10px;
            text-align: right;
            word-break: break-all;
        }

        .display-secondary {
            color: var(--text-muted);
            font-size: 1.25rem;
            min-height: 1.5rem;
            margin-bottom: 8px;
            font-weight: 400;
        }

        .display-primary {
            color: var(--text-main);
            font-size: 5rem;
            font-weight: 300;
            line-height: 1;
            letter-spacing: -2px;
            transition: font-size 0.15s ease;
        }

        /* Memory Indicator */
        .mem-indicator {
            font-size: 0.75rem;
            color: var(--accent-primary);
            font-weight: 700;
            margin-top: 5px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .mem-indicator.visible { opacity: 1; }

        /* Keypad Grid */
        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            padding-bottom: 20px;
        }

        .scientific-rows {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 14px;
        }

        .app-shell.scientific .scientific-rows {
            display: grid;
        }

        /* Professional Buttons */
        .btn {
            aspect-ratio: 1;
            border: none;
            border-radius: 50%;
            font-size: 1.5rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: filter 0.1s, transform 0.1s, background-color 0.2s;
            position: relative;
        }

        .btn:active {
            transform: scale(0.92);
            filter: brightness(1.2);
        }

        .btn-num { background-color: var(--btn-number); color: var(--text-main); }
        .btn-func { background-color: var(--btn-function); color: var(--text-main); font-size: 1.2rem; }
        .btn-op { background-color: var(--accent-secondary); color: white; }
        .btn-op.active { background-color: white; color: var(--accent-secondary); }

        .btn-zero {
            grid-column: span 2;
            aspect-ratio: unset;
            border-radius: 100px;
            justify-content: flex-start;
            padding-left: 32px;
        }

        .btn-text { font-size: 1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        /* History Side Panel */
        .history-panel {
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background-color: var(--history-bg);
            backdrop-filter: blur(20px);
            z-index: 100;
            padding: 40px 24px;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
        }

        .history-panel.open { transform: translateX(0); }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
        }

        .history-entry {
            padding: 16px 0;
            border-bottom: 1px solid var(--border-subtle);
            text-align: right;
            cursor: pointer;
        }

        .history-entry:hover { opacity: 0.7; }
        .history-entry-expr { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 4px; }
        .history-entry-res { color: var(--text-main); font-size: 1.4rem; font-weight: 600; }

        /* SVG Icons Styling */
        svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>

    <div class="app-shell" id="app">
        <!-- Navigation -->
        <nav class="nav-bar">
            <button class="nav-btn" id="theme-btn" title="Toggle Theme">
                <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
            <div style="display: flex; gap: 8px;">
                <button class="nav-btn" id="sci-btn" title="Scientific Mode">
                    <svg viewBox="0 0 24 24"><path d="M2 20h20M7 20v-4m5 4V10m5 10V4"></path></svg>
                </button>
                <button class="nav-btn" id="history-btn" title="View History">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                </button>
            </div>
        </nav>

        <!-- Display Area -->
        <main class="display">
            <div class="display-secondary" id="secondary-display"></div>
            <div class="display-primary" id="primary-display">0</div>
            <div class="mem-indicator" id="mem-label">MEMORY ACTIVE</div>
        </main>

        <!-- Keypad -->
        <section class="keypad">
            <!-- Scientific Row (Toggleable) -->
            <div class="scientific-rows">
                <button class="btn btn-func btn-text" data-type="sci" data-value="mc">mc</button>
                <button class="btn btn-func btn-text" data-type="sci" data-value="mr">mr</button>
                <button class="btn btn-func btn-text" data-type="sci" data-value="m-plus">m+</button>
                <button class="btn btn-func btn-text" data-type="sci" data-value="m-minus">m-</button>
            </div>

            <!-- Standard Rows -->
            <button class="btn btn-func" data-type="clear" id="ac-btn">AC</button>
            <button class="btn btn-func" data-type="negate">
                <svg viewBox="0 0 24 24"><path d="M5 12h14m-7-7v14"></path><path d="M5 12h14" style="transform: translateY(4px); opacity: 0.5;"></path></svg>
            </button>
            <button class="btn btn-func" data-type="percent">
                <svg viewBox="0 0 24 24"><line x1="19" y1="5" x2="5" y2="19"></line><circle cx="6.5" cy="6.5" r="2.5"></circle><circle cx="17.5" cy="17.5" r="2.5"></circle></svg>
            </button>
            <button class="btn btn-op" data-type="operator" data-value="/">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="7" r="1"></circle><line x1="5" y1="12" x2="19" y2="12"></line><circle cx="12" cy="17" r="1"></circle></svg>
            </button>

            <button class="btn btn-num" data-type="number" data-value="7">7</button>
            <button class="btn btn-num" data-type="number" data-value="8">8</button>
            <button class="btn btn-num" data-type="number" data-value="9">9</button>
            <button class="btn btn-op" data-type="operator" data-value="*">
                <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>

            <button class="btn btn-num" data-type="number" data-value="4">4</button>
            <button class="btn btn-num" data-type="number" data-value="5">5</button>
            <button class="btn btn-num" data-type="number" data-value="6">6</button>
            <button class="btn btn-op" data-type="operator" data-value="-">
                <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>

            <button class="btn btn-num" data-type="number" data-value="1">1</button>
            <button class="btn btn-num" data-type="number" data-value="2">2</button>
            <button class="btn btn-num" data-type="number" data-value="3">3</button>
            <button class="btn btn-op" data-type="operator" data-value="+">
                <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>

            <button class="btn btn-num btn-zero" data-type="number" data-value="0">0</button>
            <button class="btn btn-num" data-type="decimal">.</button>
            <button class="btn btn-op" data-type="equals">
                <svg viewBox="0 0 24 24"><line x1="5" y1="9" x2="19" y2="9"></line><line x1="5" y1="15" x2="19" y2="15"></line></svg>
            </button>
        </section>

        <!-- History Overlay -->
        <aside class="history-panel" id="history-panel">
            <div class="history-header">
                <h2 style="font-weight: 600; font-size: 1.4rem;">Activity</h2>
                <button class="nav-btn" id="history-close-btn">
                    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="history-list" id="history-list">
                <!-- Entries generated by JS -->
            </div>
            <button class="btn btn-func btn-text" style="border-radius: 16px; aspect-ratio: unset; height: 50px; margin-top: 20px;" id="clear-history-btn">Clear History</button>
        </aside>
    </div>

    <script>
        /**
         * PRODUCTION GRADE CALCULATOR ENGINE
         * Modular State Management & Business Logic
         */
        
        const AudioSystem = (() => {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            let muted = false;

            const play = (freq, duration) => {
                if (muted) return;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(0.05, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            };

            return {
                tap: () => play(600, 0.1),
                error: () => play(150, 0.3),
                toggle: () => muted = !muted
            };
        })();

        const CalculatorState = {
            current: '0',
            previous: null,
            operator: null,
            waitingForNext: false,
            memory: 0,
            history: JSON.parse(localStorage.getItem('fin_calc_history')) || []
        };

        const UI = {
            primary: document.getElementById('primary-display'),
            secondary: document.getElementById('secondary-display'),
            memLabel: document.getElementById('mem-label'),
            historyList: document.getElementById('history-list'),
            app: document.getElementById('app'),

            update() {
                // Font resizing logic for large numbers
                const length = CalculatorState.current.length;
                if (length > 12) this.primary.style.fontSize = '2.2rem';
                else if (length > 8) this.primary.style.fontSize = '3rem';
                else this.primary.style.fontSize = '5rem';

                this.primary.innerText = this.formatNumber(CalculatorState.current);
                this.secondary.innerText = CalculatorState.operator 
                    ? `${this.formatNumber(CalculatorState.previous)} ${CalculatorState.operator}` 
                    : '';
                
                this.memLabel.classList.toggle('visible', CalculatorState.memory !== 0);
                document.getElementById('ac-btn').innerText = CalculatorState.current === '0' ? 'AC' : 'C';
                
                // Highlight active operator
                document.querySelectorAll('.btn-op').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.value === CalculatorState.operator && CalculatorState.waitingForNext);
                });
            },

            formatNumber(num) {
                if (!num || num === 'Error') return num;
                const parts = num.toString().split('.');
                parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
                return parts.join('.');
            },

            renderHistory() {
                this.historyList.innerHTML = CalculatorState.history.map((item, idx) => `
                    <div class="history-entry" data-index="${idx}">
                        <div class="history-entry-expr">${item.expr}</div>
                        <div class="history-entry-res">${this.formatNumber(item.res)}</div>
                    </div>
                `).join('');
            }
        };

        const Engine = {
            inputNumber(digit) {
                if (CalculatorState.waitingForNext) {
                    CalculatorState.current = digit;
                    CalculatorState.waitingForNext = false;
                } else {
                    CalculatorState.current = CalculatorState.current === '0' ? digit : CalculatorState.current + digit;
                }
            },

            inputDecimal() {
                if (CalculatorState.waitingForNext) {
                    CalculatorState.current = '0.';
                    CalculatorState.waitingForNext = false;
                    return;
                }
                if (!CalculatorState.current.includes('.')) {
                    CalculatorState.current += '.';
                }
            },

            handleOperator(nextOp) {
                const inputValue = parseFloat(CalculatorState.current);

                if (CalculatorState.operator && CalculatorState.waitingForNext) {
                    CalculatorState.operator = nextOp;
                    return;
                }

                if (CalculatorState.previous === null) {
                    CalculatorState.previous = inputValue;
                } else if (CalculatorState.operator) {
                    const result = this.performCalculation();
                    CalculatorState.current = String(result);
                    CalculatorState.previous = result;
                }

                CalculatorState.waitingForNext = true;
                CalculatorState.operator = nextOp;
            },

            performCalculation() {
                const first = CalculatorState.previous;
                const second = parseFloat(CalculatorState.current);
                let result = 0;

                switch (CalculatorState.operator) {
                    case '+': result = first + second; break;
                    case '-': result = first - second; break;
                    case '*': result = first * second; break;
                    case '/': result = second === 0 ? 'Error' : first / second; break;
                    default: return second;
                }

                if (result !== 'Error') {
                    result = parseFloat(result.toFixed(10)); // Precision handling
                    this.saveHistory(`${first} ${CalculatorState.operator} ${second} =`, result);
                } else {
                    AudioSystem.error();
                }

                return result;
            },

            saveHistory(expr, res) {
                CalculatorState.history.unshift({ expr, res });
                if (CalculatorState.history.length > 50) CalculatorState.history.pop();
                localStorage.setItem('fin_calc_history', JSON.stringify(CalculatorState.history));
                UI.renderHistory();
            },

            handleFunction(type, value) {
                const currentVal = parseFloat(CalculatorState.current);
                
                switch(value) {
                    case 'm-plus': CalculatorState.memory += currentVal; break;
                    case 'm-minus': CalculatorState.memory -= currentVal; break;
                    case 'mr': CalculatorState.current = String(CalculatorState.memory); break;
                    case 'mc': CalculatorState.memory = 0; break;
                }
            },

            clear() {
                if (CalculatorState.current !== '0') {
                    CalculatorState.current = '0';
                } else {
                    CalculatorState.previous = null;
                    CalculatorState.operator = null;
                    CalculatorState.waitingForNext = false;
                }
            }
        };

        /**
         * EVENT LISTENERS
         */
        document.body.addEventListener('click', (e) => {
            const btn = e.target.closest('.btn');
            if (!btn) return;

            const { type, value } = btn.dataset;
            AudioSystem.tap();

            switch(type) {
                case 'number': Engine.inputNumber(value); break;
                case 'decimal': Engine.inputDecimal(); break;
                case 'operator': Engine.handleOperator(value); break;
                case 'equals': 
                    const res = Engine.performCalculation();
                    CalculatorState.current = String(res);
                    CalculatorState.previous = null;
                    CalculatorState.operator = null;
                    CalculatorState.waitingForNext = true;
                    break;
                case 'clear': Engine.clear(); break;
                case 'negate': CalculatorState.current = String(parseFloat(CalculatorState.current) * -1); break;
                case 'percent': CalculatorState.current = String(parseFloat(CalculatorState.current) / 100); break;
                case 'sci': Engine.handleFunction(type, value); break;
            }
            UI.update();
        });

        // Toggle Scientific Mode
        document.getElementById('sci-btn').onclick = function() {
            this.classList.toggle('active');
            UI.app.classList.toggle('scientific');
        };

        // Theme Toggle
        document.getElementById('theme-btn').onclick = function() {
            const theme = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', theme);
        };

        // History Management
        const historyPanel = document.getElementById('history-panel');
        document.getElementById('history-btn').onclick = () => historyPanel.classList.add('open');
        document.getElementById('history-close-btn').onclick = () => historyPanel.classList.remove('open');
        document.getElementById('clear-history-btn').onclick = () => {
            CalculatorState.history = [];
            localStorage.removeItem('fin_calc_history');
            UI.renderHistory();
        };

        UI.historyList.onclick = (e) => {
            const entry = e.target.closest('.history-entry');
            if (entry) {
                const data = CalculatorState.history[entry.dataset.index];
                CalculatorState.current = String(data.res);
                UI.update();
                historyPanel.classList.remove('open');
            }
        };

        // Keyboard Support
        window.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') Engine.inputNumber(e.key);
            if (e.key === '.') Engine.inputDecimal();
            if (['+', '-', '*', '/'].includes(e.key)) Engine.handleOperator(e.key);
            if (e.key === 'Enter' || e.key === '=') {
                const res = Engine.performCalculation();
                CalculatorState.current = String(res);
                CalculatorState.previous = null;
                CalculatorState.operator = null;
                CalculatorState.waitingForNext = true;
            }
            if (e.key === 'Escape') Engine.clear();
            if (e.key === 'Backspace') {
                CalculatorState.current = CalculatorState.current.length > 1 
                    ? CalculatorState.current.slice(0, -1) 
                    : '0';
            }
            UI.update();
        });

        // Initialize
        UI.update();
        UI.renderHistory();

    </script>
</body>
</html>
